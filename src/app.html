<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width" />
		<script is:inline>
			const themeCookie = document.cookie
				.split("; ")
				.find((row) => row.startsWith("theme="))
				?.split("=")[1];

			if (themeCookie && themeCookie === "dark") {
				document.querySelector("html")?.classList.add("dark");
			}
		</script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover" class="transition-colors">
		<div style="display: contents" class="h-full overflow-hidden">%sveltekit.body%</div>
		<script defer data-domain="dle.dev" src="https://brain.dle.dev/js/script.js"></script>
	</body>
</html>
