# This is a basic workflow to automatically build a Svelte app and deploy it to GitHub Pages

name: Pull Request

on: pull_request

concurrency:
  group: ${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  Verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.16.0]
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 8.6.7
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Install
        run: |
          pnpm install
      - name: Lint
        run: |
          pnpm run lint
      - name: Check
        env:
          BLOG_ENTRIES_URL: ${{ secrets.BLOG_ENTRIES_URL}}
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN}}
          GH_BLOG_REPO: ${{ secrets.GH_BLOG_REPO}}
          GH_BLOG_META: ${{ secrets.GH_BLOG_META}}
          GH_CV_META: ${{ secrets.GH_CV_META}}
          PORT: ${{ secrets.PORT}}
          NEXTCLOUD_CONTACT_FORM_LOGIN: ${{ secrets.NEXTCLOUD_CONTACT_FORM_LOGIN}}
          NEXTCLOUD_CONTACT_FORM_PSW: ${{ secrets.NEXTCLOUD_CONTACT_FORM_PSW}}
        run: |
          pnpm run check
      - name: Unit Test
        run: |
          pnpm run test:unit
      - name: Install playwright browsers
        run: npx playwright install --with-deps
      - name: Integration Test
        env:
          BLOG_ENTRIES_URL: ${{ secrets.BLOG_ENTRIES_URL}}
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN}}
          GH_BLOG_REPO: ${{ secrets.GH_BLOG_REPO}}
          GH_BLOG_META: ${{ secrets.GH_BLOG_META}}
          GH_CV_META: ${{ secrets.GH_CV_META}}
          PORT: ${{ secrets.PORT}}
          NEXTCLOUD_CONTACT_FORM_LOGIN: ${{ secrets.NEXTCLOUD_CONTACT_FORM_LOGIN}}
          NEXTCLOUD_CONTACT_FORM_PSW: ${{ secrets.NEXTCLOUD_CONTACT_FORM_PSW}}
        run: |
          pnpm run test:integration

  Publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.16.0]
    needs: [Verify]
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 8.6.7
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Install
        run: |
          pnpm install
      - name: Build
        env:
          BLOG_ENTRIES_URL: ${{ secrets.BLOG_ENTRIES_URL}}
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN}}
          GH_BLOG_REPO: ${{ secrets.GH_BLOG_REPO}}
          GH_BLOG_META: ${{ secrets.GH_BLOG_META}}
          GH_CV_META: ${{ secrets.GH_CV_META}}
          PORT: ${{ secrets.PORT}}
          NEXTCLOUD_CONTACT_FORM_LOGIN: ${{ secrets.NEXTCLOUD_CONTACT_FORM_LOGIN}}
          NEXTCLOUD_CONTACT_FORM_PSW: ${{ secrets.NEXTCLOUD_CONTACT_FORM_PSW}}
        run: |
          pnpm run build
      # Run a build step here if your project requires
      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 2db6966ce8cb9a6aebb318ab0d2e4d4c
          projectName: dle-dev
          directory: ./.svelte-kit/cloudflare
          # Optional: Enable this if you want to have GitHub Deployments triggered
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Optional: Switch what branch you are publishing to.
          # By default this will be the branch which triggered this workflow
          # branch: main
          # Optional: Change the working directory
          # workingDirectory: my-site
          # Optional: Change the Wrangler version, allows you to point to a specific version or a tag such as `beta`
          wranglerVersion: "3"
  Clean-Up:
    needs: [Publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "Cleanup build folder"
        run: |
          ls -la ./
          rm -rf ./* || true
          rm -rf ./.??* || true
          ls -la ./
