# codegen.yaml
schema: http://localhost:1337/graphql
documents:
    - ./src/**/**/graphql.ts
    - ./src/**/**/fragments.ts
generates:
    ./src/@types/api.ts:
        config:
            onlyOperationTypes: true
            preResolveTypes: true
            inputMaybeValue: undefined | T
        plugins:
            - typescript
            - typescript-operations
